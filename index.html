<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CJP Utilities — Owner Portal</title>
<style>
  body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f6f7;color:#233;}
  .top{background:#1F4E5F;color:#fff;padding:16px 22px;}
  .top h1{margin:0;font-size:18px}
  .top p{margin:3px 0 0;opacity:.85;font-size:12px}
  .wrap{max-width:900px;margin:24px auto;padding:0 16px;}
  .lbox{background:#fff;border:1px solid #e2e8ea;border-radius:14px;padding:24px;max-width:360px;margin:0 auto;
        box-shadow:0 6px 20px rgba(0,0,0,.08)}
  .lbox h2{margin:0 0 14px;color:#1F4E5F;font-size:19px}
  label{display:block;font-size:13px;font-weight:bold;margin:12px 0 5px}
  input{width:100%;padding:11px;border:1px solid #cfd8dc;border-radius:8px;font-size:15px}
  button.primary{width:100%;margin-top:18px;padding:12px;background:#1F4E5F;color:#fff;border:0;
          border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer}
  .msg{margin-top:12px;font-size:14px;min-height:18px}
  .msg.err{color:#c0392b}
  .msg.ok{color:#1e8449}
  .hint{font-size:11px;color:#8894a0;margin-top:16px;line-height:1.5;border-top:1px solid #eee;padding-top:12px}
  .who{font-size:17px;font-weight:bold;margin:0 0 4px}
  .status{font-size:12px;margin:0 0 14px}
  .status.live{color:#1e8449}
  .status.fallback{color:#b26a00}
  .cards{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .card{background:#fff;border:1px solid #e2e8ea;border-radius:12px;padding:16px 18px;flex:1;min-width:150px}
  .card .k{font-size:12px;color:#667;text-transform:uppercase;letter-spacing:.5px}
  .card .v{font-size:24px;font-weight:bold;margin-top:6px}
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e2e8ea;border-radius:12px;overflow:hidden}
  th,td{padding:10px 12px;text-align:right;font-size:14px;border-bottom:1px solid #eef2f3}
  th:first-child,td:first-child{text-align:left}
  thead th{background:#1F4E5F;color:#fff;font-size:12px}
  td.pay{color:#c0392b;font-weight:bold}
  td.credit{color:#1e8449;font-weight:bold}
  .note{font-size:12px;color:#667;margin-top:10px}
  .ver{position:fixed;bottom:8px;right:10px;font-size:11px;color:#9aa;background:#fff;padding:2px 7px;border-radius:6px;border:1px solid #eee}
  .backbtn{background:none;border:0;color:#1F4E5F;font-size:13px;cursor:pointer;margin-bottom:12px;padding:0}
</style>
</head>
<body>
<div class="top">
  <h1>CJP Utilities — Owner Portal</h1>
  <p>Water &amp; electricity — deposits, charges and balance by month</p>
</div>

<div class="wrap">
  <div class="lbox" id="loginBox">
    <h2>Sign in</h2>
    <label for="u">Username</label>
    <input id="u" autocomplete="off"/>
    <label for="p">Password</label>
    <input id="p" type="password" autocomplete="off"/>
    <button class="primary" type="button" onclick="doLogin()">Sign in</button>
    <div class="msg" id="msg"></div>
    <div class="hint"><b>Demo logins:</b><br>
      ivanov / ivanov123 &nbsp;·&nbsp; petrov / petrov123 &nbsp;·&nbsp; sidorov / sidorov123</div>
  </div>
  <div id="statement"></div>
</div>

<div class="ver">build v6 · live</div>

<script>
// Published-to-web CSV links (one per tab). Order does not matter —
// the page reads each tab's title to know which owner it is.
var CSV_URLS = [
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vRg61MXwqRYxPOC6rF27YQnB7NQsoxX_ObME5q66YtEePFA9pGS0jiNT4QGjjw28nii4nXokYMr2504/pub?gid=1586215662&single=true&output=csv",
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vRg61MXwqRYxPOC6rF27YQnB7NQsoxX_ObME5q66YtEePFA9pGS0jiNT4QGjjw28nii4nXokYMr2504/pub?gid=193216564&single=true&output=csv",
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vRg61MXwqRYxPOC6rF27YQnB7NQsoxX_ObME5q66YtEePFA9pGS0jiNT4QGjjw28nii4nXokYMr2504/pub?gid=1922786771&single=true&output=csv"
];

var OWNERS = {
  ivanov:  {pw:"ivanov123",  name:"Ivanov"},
  petrov:  {pw:"petrov123",  name:"Petrov"},
  sidorov: {pw:"sidorov123", name:"Sidorov"}
};
var FALLBACK = {
  ivanov:[{m:"2026-03",w:4494,e:1284,t:5778,d:5000,b:-778},{m:"2026-04",w:3210,e:1391,t:4601,d:3000,b:-2379}],
  petrov:[{m:"2026-03",w:4108.8,e:1177,t:5285.8,d:6000,b:714.2},{m:"2026-04",w:3723.6,e:1123.5,t:4847.1,d:0,b:-4132.9}],
  sidorov:[{m:"2026-03",w:6034.8,e:1498,t:7532.8,d:4000,b:-3532.8},{m:"2026-04",w:5521.2,e:1391,t:6912.2,d:4000,b:-6445}]
};

function money(n){ return (n<0?"-":"") + Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) + " THB"; }
function num(s){ var v=parseFloat(String(s).replace(/[^0-9.\-]/g,"")); return isNaN(v)?0:v; }

function parseCSV(text){
  var rows=[],row=[],cur="",q=false;
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"')q=true;
      else if(c===','){row.push(cur);cur="";}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur="";}
      else if(c==='\r'){}
      else cur+=c; }
  }
  if(cur!==""||row.length){row.push(cur);rows.push(row);}
  return rows;
}

// returns {name, rows:[{m,w,e,t,d,b}]}
function parseTab(text){
  var rows=parseCSV(text);
  var title=(rows[0]&&rows[0][0])||"";       // e.g. "Ivanov — utilities"
  var name=title.split("—")[0].split("-")[0].trim();
  var h=-1;
  for(var i=0;i<rows.length;i++){
    var j=rows[i].join(",").toLowerCase();
    if(j.indexOf("deposit")>=0 && j.indexOf("balance")>=0){ h=i; break; }
  }
  var out=[];
  if(h>=0){
    for(var k=h+1;k<rows.length;k++){
      var r=rows[k]; if(!r) continue;
      var m=(r[1]||"").trim();
      if(!m || m.toLowerCase()==="opening") continue;
      out.push({ m:m, w:num(r[5]), e:num(r[9]), t:num(r[10]), d:num(r[0]), b:num(r[11]) });
    }
  }
  return { name:name, rows:out };
}

function doLogin(){
  var msg=document.getElementById('msg');
  try{
    var u=(document.getElementById('u').value||"").trim().toLowerCase();
    var p=(document.getElementById('p').value||"").trim();
    if(!OWNERS[u] || OWNERS[u].pw!==p){ msg.className="msg err"; msg.textContent="Wrong username or password."; return; }
    msg.className="msg ok"; msg.textContent="Signed in — loading your statement…";
    loadOwner(u);
  }catch(err){ msg.className="msg err"; msg.textContent="Error: "+err.message; }
}

function loadOwner(u){
  var o=OWNERS[u];
  showStatement(o.name, FALLBACK[u], "loading");     // never blank
  var wanted=o.name.toLowerCase();
  var fetches=CSV_URLS.map(function(url){
    return fetch(url).then(function(r){ return r.ok?r.text():""; }).catch(function(){ return ""; });
  });
  Promise.all(fetches).then(function(texts){
    var match=null;
    for(var i=0;i<texts.length;i++){
      if(!texts[i]) continue;
      var tab=parseTab(texts[i]);
      if(tab.name.toLowerCase()===wanted && tab.rows.length){ match=tab; break; }
    }
    if(match) showStatement(match.name, match.rows, "live");
    else showStatement(o.name, FALLBACK[u], "fallback");
  });
}

function showStatement(name, rows, mode){
  var totD=0,totC=0,html="";
  for(var i=0;i<rows.length;i++){
    var r=rows[i]; totD+=r.d; totC+=r.t;
    var cls=r.b<0?"pay":"credit";
    html+="<tr><td>"+r.m+"</td><td>"+money(r.w)+"</td><td>"+money(r.e)+"</td><td>"+money(r.t)+"</td><td>"+money(r.d)+"</td><td class='"+cls+"'>"+money(r.b)+"</td></tr>";
  }
  var bal=rows.length?rows[rows.length-1].b:0;
  var bc=bal<0?"#c0392b":"#1e8449", tag=bal<0?"To pay":"In credit";
  var status = mode==="live" ? "<div class='status live'>&#10003; Live from the Google Sheet — edits appear on refresh</div>"
             : mode==="loading" ? "<div class='status'>Loading live data…</div>"
             : "<div class='status fallback'>&#9888; Couldn't reach the sheet — showing built-in sample data</div>";

  var out=
    "<button class='backbtn' type='button' onclick='signOut()'>&larr; Sign out</button>"+
    "<div class='who'>"+name+"</div>"+status+
    "<div class='cards'>"+
      "<div class='card'><div class='k'>Current balance</div><div class='v' style='color:"+bc+"'>"+money(bal)+"</div><div style='color:"+bc+";font-weight:bold;font-size:13px'>"+tag+"</div></div>"+
      "<div class='card'><div class='k'>Total deposited</div><div class='v'>"+money(totD)+"</div></div>"+
      "<div class='card'><div class='k'>Total charged</div><div class='v'>"+money(totC)+"</div></div>"+
    "</div>"+
    "<table><thead><tr><th>Month</th><th>Water charge</th><th>Elec charge</th><th>Total charge</th><th>Deposited</th><th>Balance</th></tr></thead><tbody>"+html+"</tbody></table>"+
    "<div class='note'>Balance carries forward each month. Green = credit; red = amount to pay. Charges include 7% VAT.</div>";

  document.getElementById('loginBox').style.display="none";
  var s=document.getElementById('statement'); s.innerHTML=out; s.scrollIntoView();
}

function signOut(){
  document.getElementById('statement').innerHTML="";
  document.getElementById('loginBox').style.display="";
  document.getElementById('u').value=""; document.getElementById('p').value="";
  var msg=document.getElementById('msg'); msg.textContent=""; msg.className="msg";
}
</script>
</body>
</html>
